[relaychain]
# Use wrapper to ensure writable base-path for snap polkadot.
default_command = "./scripts/polkadot-snap.sh"
chain = "rococo-local"

[[relaychain.nodes]]
name = "alice"
validator = true
rpc_port = 9944
args = ["--base-path", "/tmp/zombienet-relay-alice"]

[[relaychain.nodes]]
name = "bob"
validator = true
rpc_port = 9955
args = ["--base-path", "/tmp/zombienet-relay-bob"]

[[parachains]]
id = 1000
chain_spec_path = "./dev_chain_spec.json"

[parachains.collator]
name = "charlie"
rpc_port = 9988
command = "polkadot-omni-node"
